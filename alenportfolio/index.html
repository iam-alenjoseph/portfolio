<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>Alen Joseph — Web Developer Portfolio</title>
    <meta name="description" content="Alen Joseph — BCA student & web developer skilled in Python, Java, C++, JavaScript and full-stack web development." />
    <meta name="author" content="Alen Joseph" />

    <meta property="og:title" content="Alen Joseph — Web Developer Portfolio" />
    <meta property="og:description" content="BCA student crafting clean, responsive interfaces and writing solid backend logic." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <script>
      window.addEventListener('error', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.padding = '10px';
        div.style.zIndex = '99999';
        div.style.fontSize = '12px';
        div.style.fontFamily = 'monospace';
        div.innerText = 'Error: ' + e.message + ' at ' + e.filename + ':' + e.lineno;
        document.body.appendChild(div);
      });
      window.addEventListener('unhandledrejection', function(e) {
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'orange';
        div.style.color = 'black';
        div.style.padding = '10px';
        div.style.zIndex = '99999';
        div.style.fontSize = '12px';
        div.style.fontFamily = 'monospace';
        div.innerText = 'Promise Rejection: ' + e.reason;
        document.body.appendChild(div);
      });
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
