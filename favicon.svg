<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b06bff"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c4a0ff" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Back card (rotated slightly left) -->
  <rect x="18" y="14" width="46" height="58" rx="8" fill="url(#card1)" transform="rotate(-8 41 43)"/>

  <!-- Middle card -->
  <rect x="22" y="20" width="46" height="58" rx="8" fill="url(#card2)" transform="rotate(-2 45 49)"/>

  <!-- Front card -->
  <rect x="30" y="26" width="44" height="55" rx="8" fill="url(#card3)"/>

  <!-- Document lines on front card -->
  <rect x="38" y="36" width="8" height="8" rx="2" fill="white" opacity="0.85"/>
  <rect x="50" y="38" width="16" height="2.5" rx="1.2" fill="white" opacity="0.75"/>
  <rect x="38" y="50" width="28" height="2.5" rx="1.2" fill="white" opacity="0.65"/>
  <rect x="38" y="57" width="26" height="2.5" rx="1.2" fill="white" opacity="0.6"/>
  <rect x="38" y="64" width="22" height="2.5" rx="1.2" fill="white" opacity="0.55"/>
</svg>
